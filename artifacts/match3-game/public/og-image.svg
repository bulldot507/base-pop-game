<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a75cfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a75cfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="200" cy="180" rx="280" ry="200" fill="url(#glow1)"/>
  <ellipse cx="1000" cy="150" rx="240" ry="180" fill="url(#glow2)"/>
  <ellipse cx="600" cy="560" rx="320" ry="160" fill="url(#glow1)"/>

  <!-- Mini candy grid (left decoration) -->
  <g transform="translate(60, 200)">
    <rect x="0"   y="0"  width="54" height="54" rx="12" fill="#ec4899" opacity="0.9"/>
    <rect x="62"  y="0"  width="54" height="54" rx="12" fill="#f59e0b" opacity="0.9"/>
    <rect x="124" y="0"  width="54" height="54" rx="12" fill="#6366f1" opacity="0.9"/>
    <rect x="0"   y="62" width="54" height="54" rx="12" fill="#22c55e" opacity="0.9"/>
    <rect x="62"  y="62" width="54" height="54" rx="12" fill="#3b82f6" opacity="0.9"/>
    <rect x="124" y="62" width="54" height="54" rx="12" fill="#ec4899" opacity="0.9"/>
    <rect x="0"   y="124" width="54" height="54" rx="12" fill="#f59e0b" opacity="0.9"/>
    <rect x="62"  y="124" width="54" height="54" rx="12" fill="#6366f1" opacity="0.9"/>
    <rect x="124" y="124" width="54" height="54" rx="12" fill="#22c55e" opacity="0.9"/>
  </g>

  <!-- Mini candy grid (right decoration) -->
  <g transform="translate(964, 200)">
    <rect x="0"   y="0"  width="54" height="54" rx="12" fill="#6366f1" opacity="0.9"/>
    <rect x="62"  y="0"  width="54" height="54" rx="12" fill="#22c55e" opacity="0.9"/>
    <rect x="124" y="0"  width="54" height="54" rx="12" fill="#f59e0b" opacity="0.9"/>
    <rect x="0"   y="62" width="54" height="54" rx="12" fill="#ec4899" opacity="0.9"/>
    <rect x="62"  y="62" width="54" height="54" rx="12" fill="#3b82f6" opacity="0.9"/>
    <rect x="124" y="62" width="54" height="54" rx="12" fill="#6366f1" opacity="0.9"/>
    <rect x="0"   y="124" width="54" height="54" rx="12" fill="#22c55e" opacity="0.9"/>
    <rect x="62"  y="124" width="54" height="54" rx="12" fill="#f59e0b" opacity="0.9"/>
    <rect x="124" y="124" width="54" height="54" rx="12" fill="#ec4899" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="600" y="240" font-family="Arial Black, Arial" font-size="88" font-weight="900" fill="url(#titleGrad)" text-anchor="middle" dominant-baseline="middle">
    <tspan fill="#f9a8d4">Candy</tspan><tspan fill="#a78bfa"> Crush</tspan>
  </text>

  <!-- Sparkle emoji substitute -->
  <text x="370" y="245" font-family="Arial" font-size="52" text-anchor="middle" dominant-baseline="middle">✦</text>
  <text x="830" y="245" font-family="Arial" font-size="52" text-anchor="middle" dominant-baseline="middle">✦</text>

  <!-- Subtitle -->
  <text x="600" y="325" font-family="Arial" font-size="32" fill="#a78bfa" text-anchor="middle" dominant-baseline="middle" font-weight="600">
    Match-3 Puzzle · On-Chain High Scores
  </text>

  <!-- Base badge -->
  <rect x="430" y="375" width="340" height="56" rx="16" fill="#0052FF" opacity="0.9"/>
  <text x="600" y="410" font-family="Arial" font-size="24" font-weight="800" fill="white" text-anchor="middle" dominant-baseline="middle">
    ⬡  Built on Base Mainnet
  </text>

  <!-- Bottom tagline -->
  <text x="600" y="530" font-family="Arial" font-size="22" fill="rgba(255,255,255,0.4)" text-anchor="middle" dominant-baseline="middle">
    Connect wallet · Play · Save your best score on-chain
  </text>
</svg>
